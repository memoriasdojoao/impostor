<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

<!-- PWA / "Add to Home Screen" -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Impostor" />
<meta name="theme-color" content="#0b1520" />
<title>Impostor Médico</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }

  body {
    margin: 0;
    background: #070d14;
    color: #e8eef2;
    font-family: 'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  .font-display { font-family: 'Spectral', serif; }

  #shell {
    height: 100dvh;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: radial-gradient(circle at 50% 0%, #16283a 0%, #0b1520 55%, #070d14 100%);
    position: relative;
    overflow: hidden;
  }

  /* app bar */
  #topbar {
    flex: 0 0 auto;
    padding: calc(14px + env(safe-area-inset-top)) 20px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(95,179,163,0.12);
    background: rgba(11,21,32,0.6);
    backdrop-filter: blur(6px);
  }
  #topbar .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(160deg,#1c3245,#0c1620);
    border: 1px solid #2c4257;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }
  #topbar .brand { display: flex; flex-direction: column; line-height: 1.15; }
  #topbar .brand b { font-family: 'Spectral', serif; font-size: 15px; color: #fff; font-weight: 600; }
  #topbar .brand span { font-size: 10px; color: #5fb3a3; letter-spacing: 0.1em; text-transform: uppercase; }
  #topbar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #topbar .dots { display: flex; gap: 4px; }
  #topbar .dot { width: 6px; height: 6px; border-radius: 50%; background: #24384a; transition: background .2s, transform .2s; }
  #topbar .dot.done { background: #5fb3a3; }
  #topbar .dot.current { background: #f2b880; transform: scale(1.3); }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1px solid #2c4257; background: #1a2a38;
    color: #5fb3a3; display: flex; align-items: center; justify-content: center; cursor: pointer;
    transition: transform .12s, background .15s; flex: 0 0 auto;
  }
  .icon-btn:active { transform: scale(0.9); background: #24384a; }

  /* content */
  #content {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 22px 20px 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  #content.top-align { justify-content: flex-start; }

  .pulse-svg { color: #5fb3a3; width: 100%; height: 26px; margin-bottom: 18px; opacity: 0.9; }
  .pulse-anim { stroke-dasharray: 300; stroke-dashoffset: 300; animation: pulseMove 2.4s linear infinite; }
  @keyframes pulseMove { to { stroke-dashoffset: 0; } }

  .screen { animation: fadeSlide .32s cubic-bezier(.2,.7,.2,1); }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .center { text-align: center; }

  .eyebrow {
    display: flex; align-items: center; gap: 8px;
    color: #5fb3a3; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .center .eyebrow { justify-content: center; }

  h1.title { font-size: 32px; margin: 0 0 6px; color: #fff; letter-spacing: -0.01em; line-height: 1.1; }
  h2.title { font-size: 23px; margin: 0 0 10px; color: #fff; line-height: 1.25; }
  p.sub { font-size: 13.5px; color: #8fa6b8; margin: 0 0 22px; line-height: 1.55; }

  .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .row-label { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: #c8d4dd; }

  .counter { display: flex; align-items: center; gap: 14px; }
  .counter button {
    width: 34px; height: 34px; border-radius: 50%; border: none; background: #1a2a38;
    color: #fff; font-size: 18px; cursor: pointer; transition: transform .1s, background .15s;
  }
  .counter button:active { transform: scale(0.9); background: #24384a; }
  .counter span { width: 26px; text-align: center; font-family: 'Spectral', serif; font-size: 19px; color: #fff; }

  .level-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 22px; }
  .level-btn {
    font-size: 11.5px; padding: 9px 4px; border-radius: 7px; border: 1px solid #1e3140; cursor: pointer;
    background: #131f2c; color: #8fa6b8; font-family: 'IBM Plex Mono', monospace; transition: all .15s;
  }
  .level-btn.active { background: #5fb3a3; color: #0b1520; font-weight: 600; border-color: #5fb3a3; }
  .level-btn:active { transform: scale(0.96); }

  details { margin-bottom: 4px; }
  summary { font-size: 13px; color: #5fb3a3; cursor: pointer; list-style: none; }
  summary::-webkit-details-marker { display: none; }
  summary:before { content: "▸ "; }
  details[open] summary:before { content: "▾ "; }
  .names-list { margin-top: 12px; max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
  .names-list input {
    width: 100%; font-size: 13.5px; padding: 9px 12px; border-radius: 7px;
    background: #0e1822; color: #e8eef2; border: 1px solid #1e3140; font-family: inherit;
  }
  .names-list input:focus { border-color: #5fb3a3; outline: none; }

  .paper {
    background: #fdf6ee; border-radius: 10px; padding: 26px 22px; margin-bottom: 4px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  .paper.doctor { border: 2px solid #5fb3a3; }
  .paper.impostor { border: 2px dashed #c1432e; }
  .paper .clip { font-size: 16px; margin-bottom: 6px; }
  .paper .eyebrow2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a8f85; margin-bottom: 8px; }
  .paper .diag { font-family: 'Spectral', serif; font-size: 25px; color: #1f2d27; }
  .paper .note { font-size: 13.5px; color: #5a6f65; margin-top: 16px; line-height: 1.55; }

  .stamp {
    display: inline-block; padding: 10px 18px; border: 3px solid #c1432e; border-radius: 6px;
    color: #c1432e; font-family: 'Spectral', serif; font-size: 22px; letter-spacing: 0.06em;
    transform: rotate(-6deg); animation: stampIn 0.4s cubic-bezier(.2,.8,.3,1.2) forwards;
  }
  @keyframes stampIn {
    0% { transform: scale(2.4) rotate(-16deg); opacity: 0; }
    60% { transform: scale(0.94) rotate(-6deg); opacity: 1; }
    100% { transform: scale(1) rotate(-6deg); opacity: 1; }
  }

  .announce-box {
    background: #fdf6ee; border: 2px solid #5fb3a3; border-radius: 10px;
    padding: 26px; margin-bottom: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    animation: stampIn 0.4s cubic-bezier(.2,.8,.3,1.2) forwards;
  }
  .announce-box .eyebrow2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a8f85; margin-bottom: 8px; }
  .announce-box .name { font-family: 'Spectral', serif; font-size: 28px; color: #1f2d27; }

  .starter-box {
    background: #1a2a38; border: 1px solid #2c4257; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 20px; text-align: center;
  }
  .starter-box .eyebrow2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7a8f95; margin-bottom: 4px; }
  .starter-box .name { font-family: 'Spectral', serif; font-size: 19px; color: #f2b880; }
  .starter-box .hint { font-size: 11.5px; color: #5a7285; margin-top: 4px; }

  .timer { font-family: 'Spectral', serif; font-size: 58px; text-align: center; margin-bottom: 4px; font-variant-numeric: tabular-nums; }

  /* action bar */
  #actionbar {
    flex: 0 0 auto;
    padding: 12px 20px calc(16px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: linear-gradient(to top, rgba(7,13,20,0.9), rgba(7,13,20,0));
  }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  button.btn {
    width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'Spectral', serif; font-size: 17px; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: transform .12s, filter .15s;
  }
  button.btn:active { transform: scale(0.97); filter: brightness(0.95); }
  .btn-primary { background: #c1432e; color: #fdf6ee; }
  .btn-accent { background: #5fb3a3; color: #0b1520; }
  .btn-muted { background: #1c2c3a; color: #e8eef2; border: 1px solid #2c4257; }
  .btn-square {
    padding: 0 18px; border-radius: 12px; border: 1px solid #2c4257; background: #1c2c3a;
    color: #e8eef2; cursor: pointer; font-size: 16px; transition: transform .12s;
  }
  .btn-square:active { transform: scale(0.92); }

  .footer-hint { text-align: center; font-size: 10.5px; color: #3f5568; margin-top: 2px; }

  #madeby {
    flex: 0 0 auto;
    text-align: center;
    padding: 2px 20px calc(10px + env(safe-area-inset-bottom));
    font-size: 11px;
    color: #4a6275;
    background: #070d14;
  }
  #madeby a { color: #5fb3a3; text-decoration: none; font-weight: 600; }
  #madeby a:active { opacity: 0.7; }

  #toast {
    position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%) translateY(10px);
    background: #1a2a38; color: #e8eef2; padding: 10px 18px; border-radius: 20px;
    font-size: 12.5px; border: 1px solid #2c4257; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 50;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input:focus, button:focus-visible { outline: 2px solid #5fb3a3; outline-offset: 2px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #24384a; border-radius: 4px; }
</style>
</head>
<body>
  <div id="shell">
    <div id="topbar"></div>
    <div id="content"></div>
    <div id="actionbar"></div>
    <div id="madeby">Desenvolvido por <a href="https://www.instagram.com/cruzavam" target="_blank" rel="noopener">@cruzavam</a></div>
  </div>
  <div id="toast"></div>

<script>
const DISEASES = [
  { name: "Diabetes", level: "facil" },
  { name: "Hipertensión", level: "facil" },
  { name: "Asma", level: "facil" },
  { name: "Migraña", level: "facil" },
  { name: "Anemia", level: "facil" },
  { name: "Varicela", level: "facil" },
  { name: "Gripe", level: "facil" },
  { name: "Neumonía", level: "facil" },
  { name: "Apendicitis", level: "facil" },
  { name: "Conjuntivitis", level: "facil" },
  { name: "Amigdalitis", level: "facil" },
  { name: "Otitis", level: "facil" },
  { name: "Gastritis", level: "facil" },
  { name: "Bronquitis", level: "facil" },
  { name: "Sarampión", level: "facil" },
  { name: "Dermatitis", level: "facil" },
  { name: "Insomnio", level: "facil" },
  { name: "Obesidad", level: "facil" },
  { name: "Alergia alimentaria", level: "facil" },
  { name: "Resfriado común", level: "facil" },
  { name: "Artritis reumatoide", level: "intermedio" },
  { name: "Hipotiroidismo", level: "intermedio" },
  { name: "Hipertiroidismo", level: "intermedio" },
  { name: "Osteoporosis", level: "intermedio" },
  { name: "Colitis ulcerosa", level: "intermedio" },
  { name: "Epilepsia", level: "intermedio" },
  { name: "Cálculos renales", level: "intermedio" },
  { name: "Úlcera péptica", level: "intermedio" },
  { name: "Cirrosis hepática", level: "intermedio" },
  { name: "Fibromialgia", level: "intermedio" },
  { name: "Psoriasis", level: "intermedio" },
  { name: "Vértigo posicional", level: "intermedio" },
  { name: "Reflujo gastroesofágico", level: "intermedio" },
  { name: "Tendinitis", level: "intermedio" },
  { name: "Escoliosis", level: "intermedio" },
  { name: "Sinusitis crónica", level: "intermedio" },
  { name: "Varices", level: "intermedio" },
  { name: "Cataratas", level: "intermedio" },
  { name: "Glaucoma", level: "intermedio" },
  { name: "Anorexia nerviosa", level: "intermedio" },
  { name: "Lupus eritematoso", level: "dificil" },
  { name: "Esclerosis múltiple", level: "dificil" },
  { name: "Enfermedad de Crohn", level: "dificil" },
  { name: "Fibrosis quística", level: "dificil" },
  { name: "Síndrome de Guillain-Barré", level: "dificil" },
  { name: "Enfermedad de Parkinson", level: "dificil" },
  { name: "Enfermedad de Alzheimer", level: "dificil" },
  { name: "Miastenia gravis", level: "dificil" },
  { name: "Hemofilia", level: "dificil" },
  { name: "Anemia falciforme", level: "dificil" },
  { name: "Enfermedad de Wilson", level: "dificil" },
  { name: "Síndrome de Cushing", level: "dificil" },
  { name: "Enfermedad de Addison", level: "dificil" },
  { name: "Espondilitis anquilosante", level: "dificil" },
  { name: "Síndrome de Sjögren", level: "dificil" },
  { name: "Enfermedad de Graves", level: "dificil" },
  { name: "Amiloidosis", level: "dificil" },
  { name: "Porfiria", level: "dificil" },
];
const LEVEL_LABEL = { facil: "Fácil", intermedio: "Intermedio", dificil: "Difícil", todas: "Todas" };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = {
  phase: "setup",
  playerCount: 10,
  names: Array.from({ length: 10 }, (_, i) => (i === 9 ? "Jugador 10 (extra)" : `Jugador ${i + 1}`)),
  level: "todas",
  currentIndex: 0,
  revealed: false,
  disease: null,
  impostorIndex: null,
  starterIndex: null,
  announceRevealed: false,
  seconds: 90,
  running: false,
  resultShown: false,
};
let timerInterval = null;

function set(partial) {
  Object.assign(state, partial);
  render();
}

function ensureNamesLength() {
  const next = [...state.names];
  while (next.length < state.playerCount) next.push(`Jugador ${next.length + 1}`);
  state.names = next.slice(0, state.playerCount);
}

function startGame() {
  const pool = state.level === "todas" ? DISEASES : DISEASES.filter(d => d.level === state.level);
  const chosen = shuffle(pool)[0];
  const impostor = Math.floor(Math.random() * state.playerCount);
  const starter = Math.floor(Math.random() * state.playerCount);
  clearInterval(timerInterval);
  set({
    disease: chosen.name,
    impostorIndex: impostor,
    starterIndex: starter,
    announceRevealed: false,
    currentIndex: 0,
    revealed: false,
    seconds: 90,
    running: false,
    resultShown: false,
    phase: "announce",
  });
}

function nextPlayer() {
  if (state.currentIndex + 1 < state.playerCount) {
    set({ currentIndex: state.currentIndex + 1, revealed: false });
  } else {
    set({ phase: "discussion" });
  }
}

function toggleTimer() {
  if (!state.running) {
    state.running = true;
    timerInterval = setInterval(() => {
      if (state.seconds <= 0) { clearInterval(timerInterval); set({ running: false }); return; }
      set({ seconds: state.seconds - 1 });
    }, 1000);
    render();
  } else {
    clearInterval(timerInterval);
    set({ running: false });
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  set({ seconds: 90, running: false });
}

function fullReset() {
  clearInterval(timerInterval);
  set({ phase: "setup", disease: null, impostorIndex: null, starterIndex: null, announceRevealed: false });
}

function fmtTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, "0");
  const ss = String(s % 60).padStart(2, "0");
  return `${m}:${ss}`;
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function shareGame() {
  const shareData = {
    title: "Impostor Médico",
    text: "🩺 Te reto a jugar Impostor Médico con nosotros. ¡Descubre quién es el impostor!",
    url: window.location.href,
  };
  if (navigator.share) {
    navigator.share(shareData).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(shareData.url)
      .then(() => showToast("Enlace copiado ✅"))
      .catch(() => window.prompt("Copia el enlace:", shareData.url));
  } else {
    window.prompt("Copia el enlace:", shareData.url);
  }
}

function pulseSvg() {
  return `<svg class="pulse-svg" viewBox="0 0 300 40" preserveAspectRatio="none">
    <polyline class="pulse-anim" points="0,20 60,20 75,20 85,4 95,36 105,20 120,20 140,20 150,10 160,30 170,20 190,20 300,20"
      fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
  </svg>`;
}

function renderTopbar() {
  const s = state;
  const top = document.getElementById("topbar");
  let dots = "";
  if (s.phase === "reveal") {
    dots = `<div class="dots">${Array.from({length: s.playerCount}).map((_,i) => {
      let cls = "";
      if (i < s.currentIndex) cls = "done";
      else if (i === s.currentIndex) cls = "current";
      return `<div class="dot ${cls}"></div>`;
    }).join("")}</div>`;
  }
  top.innerHTML = `
    <div class="logo">🩺</div>
    <div class="brand"><b>Impostor Médico</b><span>Historia clínica</span></div>
    <div class="right">
      ${dots}
      <button class="icon-btn" id="shareBtn" aria-label="Compartir">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4"/><path d="M7 9l5-5 5 5"/><path d="M5 21h14a2 2 0 0 0 2-2v-4"/><path d="M5 21a2 2 0 0 1-2-2v-4"/>
        </svg>
      </button>
    </div>
  `;
  top.querySelector("#shareBtn").onclick = shareGame;
}

function render() {
  renderTopbar();
  const content = document.getElementById("content");
  const actionbar = document.getElementById("actionbar");
  content.className = "";
  actionbar.innerHTML = "";
  const s = state;

  if (s.phase === "setup") {
    content.className = "top-align";
    content.innerHTML = `
      <div class="screen">
        ${pulseSvg()}
        <div class="eyebrow">🩺 <span>Sala de espera</span></div>
        <h1 class="title font-display">Impostor Médico</h1>
        <p class="sub">9 jugadores reciben el diagnóstico. 1 impostor no sabe nada. Pasen el mismo teléfono, uno por uno.</p>

        <div class="row-between">
          <span class="row-label">👥 Jugadores</span>
          <div class="counter">
            <button id="dec">−</button>
            <span class="font-display">${s.playerCount}</span>
            <button id="inc">+</button>
          </div>
        </div>

        <div>
          <span class="row-label" style="margin-bottom:8px; display:flex;">📋 Dificultad del diagnóstico</span>
          <div class="level-grid">
            ${["todas","facil","intermedio","dificil"].map(lv => `
              <button class="level-btn ${s.level===lv?'active':''}" data-level="${lv}">${LEVEL_LABEL[lv]}</button>
            `).join("")}
          </div>
        </div>

        <details>
          <summary>Editar nombres de los jugadores (opcional)</summary>
          <div class="names-list">
            ${s.names.map((n,i) => `<input data-idx="${i}" value="${n.replace(/"/g,'&quot;')}" />`).join("")}
          </div>
        </details>
      </div>
    `;
    actionbar.innerHTML = `<button class="btn btn-primary" id="startBtn">🔀 Repartir diagnóstico</button>`;

    content.querySelector("#dec").onclick = () => { state.playerCount = Math.max(4, state.playerCount - 1); ensureNamesLength(); render(); };
    content.querySelector("#inc").onclick = () => { state.playerCount = Math.min(14, state.playerCount + 1); ensureNamesLength(); render(); };
    content.querySelectorAll(".level-btn").forEach(b => b.onclick = () => set({ level: b.dataset.level }));
    content.querySelectorAll(".names-list input").forEach(inp => inp.oninput = (e) => {
      state.names[Number(e.target.dataset.idx)] = e.target.value;
    });
    actionbar.querySelector("#startBtn").onclick = startGame;
  }

  else if (s.phase === "announce") {
    content.innerHTML = `
      <div class="screen center">
        <div class="eyebrow">❤️ <span>Antes de repartir las fichas</span></div>
        <h2 class="title font-display">${s.announceRevealed ? "Ya está decidido" : "¿Todos listos y prestando atención?"}</h2>
        <p class="sub">${s.announceRevealed ? "Anúncienlo en voz alta antes de empezar a pasar el teléfono." : "Toca el botón para revelar quién abre la ronda de pistas."}</p>
        ${s.announceRevealed ? `
          <div class="announce-box">
            <div class="eyebrow2">Empieza hablando</div>
            <div class="name">${s.names[s.starterIndex]}</div>
          </div>
        ` : ""}
      </div>
    `;
    if (!s.announceRevealed) {
      actionbar.innerHTML = `<button class="btn btn-accent" id="startTalkBtn">▶ Começar</button>`;
      actionbar.querySelector("#startTalkBtn").onclick = () => set({ announceRevealed: true });
    } else {
      actionbar.innerHTML = `<button class="btn btn-accent" id="toReveal">Empezar a repartir fichas →</button>`;
      actionbar.querySelector("#toReveal").onclick = () => set({ phase: "reveal" });
    }
  }

  else if (s.phase === "reveal") {
    const isImpostor = s.currentIndex === s.impostorIndex;
    content.innerHTML = `
      <div class="screen center">
        <div class="eyebrow" style="justify-content:center;">Paciente ${s.currentIndex + 1} de ${s.playerCount}</div>
        <h2 class="title font-display">Entrega el teléfono a<br><span style="color:#f2b880">${s.names[s.currentIndex]}</span></h2>
        ${s.revealed ? `
          ${isImpostor ? `
            <div class="paper impostor">
              <div class="clip">📎</div>
              <div><span class="stamp">SIN DIAGNÓSTICO</span></div>
              <p class="note">Eres el <strong>IMPOSTOR</strong>. No conoces la enfermedad: improvisa con lo que digan los demás y no te delates.</p>
            </div>
          ` : `
            <div class="paper doctor">
              <div class="clip">📎</div>
              <div class="eyebrow2">Diagnóstico confirmado</div>
              <div class="diag">${s.disease}</div>
              <p class="note">Da pistas sobre esta enfermedad sin decir su nombre. Ayuda a descubrir al impostor.</p>
            </div>
          `}
        ` : ""}
      </div>
    `;
    if (!s.revealed) {
      actionbar.innerHTML = `<button class="btn btn-accent" id="revealBtn">👁 Ver mi ficha médica</button>`;
      actionbar.querySelector("#revealBtn").onclick = () => set({ revealed: true });
    } else {
      actionbar.innerHTML = `<button class="btn btn-muted" id="nextBtn">🙈 Ocultar y pasar el teléfono →</button>`;
      actionbar.querySelector("#nextBtn").onclick = nextPlayer;
    }
  }

  else if (s.phase === "discussion") {
    content.innerHTML = `
      <div class="screen center">
        <div class="eyebrow" style="justify-content:center;">💓 <span>Sala de discusión</span></div>
        <h2 class="title font-display">Den pistas y debatan quién es el impostor</h2>
        <div class="starter-box">
          <div class="eyebrow2">Empieza a dar la primera pista</div>
          <div class="name">${s.names[s.starterIndex]}</div>
          <div class="hint">Después se sigue por orden, en ronda, hacia la derecha.</div>
        </div>
        <div class="timer" style="color:${s.seconds===0?'#c1432e':'#f2b880'}">${fmtTime(s.seconds)}</div>
        <p class="sub" style="margin-top:0; color:${s.seconds===0?'#c1432e':'#8fa6b8'}">
          ${s.seconds === 0 ? "¡Tiempo terminado! Voten ahora, a la cuenta de tres." : "Nadie dice el nombre de la enfermedad en voz alta."}
        </p>
      </div>
    `;
    actionbar.innerHTML = `
      <div class="btn-row">
        <button class="btn btn-accent" id="timerToggle">${s.running ? "⏸ Pausar" : "▶ Iniciar"}</button>
        <button class="btn-square" id="timerReset">🔄</button>
      </div>
      <button class="btn btn-primary" id="toVote">Ir a votación</button>
    `;
    actionbar.querySelector("#timerToggle").onclick = toggleTimer;
    actionbar.querySelector("#timerReset").onclick = resetTimer;
    actionbar.querySelector("#toVote").onclick = () => { clearInterval(timerInterval); set({ phase: "result" }); };
  }

  else if (s.phase === "result") {
    content.innerHTML = `
      <div class="screen center">
        <div style="font-size:20px; margin-bottom:8px;">⏱</div>
        <h2 class="title font-display">Votación</h2>
        <p class="sub">Todos señalan a la cuenta de tres a quien creen impostor. Cuando quieran confirmar, revelen la ficha final.</p>
        ${s.resultShown ? `
          <div class="paper impostor">
            <div class="eyebrow2">El impostor era</div>
            <div class="diag" style="margin-bottom:12px;">${s.names[s.impostorIndex]}</div>
            <div class="eyebrow2">La enfermedad era</div>
            <div class="diag" style="color:#c1432e;">${s.disease}</div>
          </div>
        ` : ""}
      </div>
    `;
    if (!s.resultShown) {
      actionbar.innerHTML = `<button class="btn btn-primary" id="revealFinal">Revelar impostor</button>`;
      actionbar.querySelector("#revealFinal").onclick = () => set({ resultShown: true });
    } else {
      actionbar.innerHTML = `
        <div class="btn-row">
          <button class="btn btn-accent" id="againBtn">🔀 Otra ronda</button>
          <button class="btn btn-muted" id="newBtn">Nueva partida</button>
        </div>
      `;
      actionbar.querySelector("#againBtn").onclick = startGame;
      actionbar.querySelector("#newBtn").onclick = fullReset;
    }
  }
}

render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
